services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./core-schema.sql:/docker-entrypoint-initdb.d/core-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - kanshi-network

  core:
    image: johnyoat/kanshi-core:0.1.0
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kanshi-network
  dashboard:
    image: johnyoat/kanshi-ui:0.1.0
    ports:
      - "80:80"
    depends_on:
      core:
        condition: service_started
    networks:
      - kanshi-network

networks:
  kanshi-network:
    driver: bridge